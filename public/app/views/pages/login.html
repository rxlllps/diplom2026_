<!-- login.html -->
<div style="margin-top: 40px">
	<div class="container" style="max-width: 500px">
		<div style="text-align: center; margin-bottom: 40px">
			<div style="font-size: 5em; margin-bottom: 20px; animation: bounce 1s infinite;">🦊</div>
			<h1 style="margin-top: 20px">Вход в систему</h1>
			<p style="color: #7f8c8d; font-size: 1.1em">Добро пожаловать в Purple Fox Karaoke</p>
		</div>
		
		<form role="login" ng-submit="main.doLogin()">
			<div class="form-group">
				<label for="username"><i class="fa fa-user-circle" style="margin-right: 8px;"></i>Имя пользователя</label>
				<input id="username" type="text" class="form-control" placeholder="Введите ваше имя" ng-model="main.loginData.username" required>
			</div>
			<div class="form-group">
				<label for="password"><i class="fa fa-key" style="margin-right: 8px;"></i>Пароль</label>
				<input id="password" type="password" class="form-control" placeholder="Введите ваш пароль" ng-model="main.loginData.password" required>
			</div>
			
			<div ng-if="main.errorMsg" class="alert alert-danger" role="alert" style="animation: slideIn 0.3s ease;">
				<i class="fa fa-exclamation-circle"></i> {{ main.errorMsg }}
			</div>
			
			<button type="submit" class="btn btn-success btn-block btn-lg" style="margin-bottom: 15px; padding: 12px; font-weight: 600;">
				<i class="fa fa-sign-in" style="margin-right: 8px;"></i> Войти
			</button>
		</form>
		
		<hr style="border-color: #ddd; margin: 30px 0;">
		
		<div style="text-align: center">
			<p style="margin-bottom: 15px; animation: slideIn 0.4s ease;">
				<a href="/pwResetForgot" style="font-size: 1.05em; transition: all 0.3s ease;" onmouseover="this.style.color='#a855a8'" onmouseout="this.style.color='#8b3a8b'">
					<i class="fa fa-question-circle" style="margin-right: 5px;"></i> Забыли пароль?
				</a>
			</p>
			<p style="margin: 0; animation: slideIn 0.5s ease;">
				<a href="/register" style="font-size: 1.05em; transition: all 0.3s ease;" onmouseover="this.style.color='#a855a8'" onmouseout="this.style.color='#8b3a8b'">
					<i class="fa fa-user-plus" style="margin-right: 5px;"></i> Создать аккаунт
				</a>
			</p>
		</div>
	</div>
</div>

<style>
input:focus {
  transition: all 0.3s ease;
}
</style>
