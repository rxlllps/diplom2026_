<!-- contact.html -->
<div class="container">	
<div class="page-header">
	<h1><i class="fa fa-envelope" style="margin-right: 10px;"></i>Свяжитесь с нами</h1>
</div>

<div class="row">
	<div class="alert alert-success" ng-show="contact.message" style="animation: slideIn 0.3s ease;">
			<i class="fa fa-check-circle" style="margin-right: 10px;"></i>{{ contact.message }}
	</div>
</div>

<div ng-hide="contact.message">
	<form ng-submit="contact.sendMail()">
		<div class="col-sm-6">
			<div class="row">
				<div class="form-group">
					<label for="email"><i class="fa fa-envelope" style="margin-right: 5px;"></i>Ваш email</label>
					<!-- contactUs.email is not actually a function yet -->
					<input type="email" class="form-control" placeholder="ваш@email.com" ng-model="contact.userData.email" required>
				</div>
			</div>
			<div class="row">
				<div class="form-group">
					<label><i class="fa fa-pencil" style="margin-right: 5px;"></i>Тема сообщения</label>
					<input type="text" class="form-control" placeholder="О чём вы хотите написать?" ng-model="contact.userData.subject" required>
				</div>
			</div>
			<div class="row">
				<div class="form-group">
					<label class="message"><i class="fa fa-comment" style="margin-right: 5px;"></i>Ваше сообщение</label>
					<textarea class="form-control" rows="5" id="message" placeholder="Напишите ваше сообщение здесь..." ng-model="contact.userData.message" required></textarea>
				</div>
			</div>	
			<div class="row">
				<button type="submit" class="btn btn-success" ng-disabled="!contact.userData.email || !contact.userData.subject || !contact.userData.message">
					<i class="fa fa-send" style="margin-right: 5px;"></i>Отправить сообщение
				</button>
			</div>
		</div>			
	</form>
	<div class="col-sm-6" style="text-align:center; padding: 20px; background: rgba(139, 58, 139, 0.05); border-radius: 10px;">
		<h4 style="color: #8b3a8b;"><i class="fa fa-info-circle" style="margin-right: 10px;"></i>Контактная информация</h4>
		<div style="margin-top: 20px;">
			<p style="font-size: 1.1em; margin: 15px 0;">
				<i class="fa fa-building" style="color: #8b3a8b; margin-right: 10px;"></i>
				<strong>Purple Fox Karaoke Pub</strong>
			</p>
			<p style="font-size: 1.1em; margin: 15px 0;">
				<i class="fa fa-phone" style="color: #8b3a8b; margin-right: 10px;"></i>
				<strong>250-555-5555</strong>
			</p>
			<p style="font-size: 1.1em; margin: 15px 0;">
				<i class="fa fa-map-marker" style="color: #8b3a8b; margin-right: 10px;"></i>
				<strong>1234 Place Ave. A1B 2C3</strong>
			</p>
			<p style="margin-top: 20px; color: #7f8c8d;">
				<em>Мы всегда рады услышать ваши предложения!</em>
			</p>
		</div>
	</div>
</div>
<br></br>

</div>
